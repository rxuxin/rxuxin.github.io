<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的博客</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        .container {
            width: 80%;
            margin: 20px auto;
            background: #fff;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        header {
            text-align: center;
            padding: 20px 0;
            background: #333;
            color: #fff;
        }
        article {
            margin-bottom: 20px;
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }
        footer {
            text-align: center;
            padding: 10px;
            background: #333;
            color: #fff;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <header>
        <h1>我的博客</h1>
        <p>记录生活点滴</p>
    </header>
    <div class="container">
        <article>
            <h2>第一篇博客</h2>
            <p>这是我的第一篇博客文章，欢迎阅读！</p>
        </article>
        <article>
            <h2>第二篇博客</h2>
            <p>这是我的第二篇博客文章，分享一些有趣的事情。</p>
        </article>
    </div>
    <footer>
        <p>&copy; 2025 我的博客. 版权所有.</p>
    </footer>
</body>
</html>
